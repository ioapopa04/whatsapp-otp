<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>WhatsApp OTP Test</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 20px; }
    input, button { display: block; width: 100%; margin: 8px 0; padding: 10px; font-size: 15px; box-sizing: border-box; }
    button { background: #25D366; color: white; border: none; border-radius: 6px; cursor: pointer; }
    #status { margin-top: 12px; font-size: 14px; color: #333; }
  </style>
</head>
<body>
  <h2>Register</h2>

  <div id="step1">
    <input id="phone" type="tel" placeholder="+1 917 555 0198" />
    <button onclick="register()">Send WhatsApp code</button>
  </div>

  <div id="step2" style="display:none">
    <p>Enter the 6-digit code sent to your WhatsApp:</p>
    <input id="code" type="text" maxlength="6" placeholder="482910" />
    <button onclick="verify()">Verify</button>
  </div>

  <div id="status"></div>

  <script>
    let globalPhone = '';

    async function register() {
      const phone = document.getElementById('phone').value;
      globalPhone = phone;
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone }),
      });
      const data = await res.json();
      document.getElementById('status').textContent = data.message ?? data.error;
      if (res.ok) {
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
      }
    }

    async function verify() {
      const code = document.getElementById('code').value;
      const res = await fetch('/api/verify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: globalPhone, code }),
      });
      const data = await res.json();
      document.getElementById('status').textContent =
        data.ok ? '✅ Verified! You can now receive messages.' : `❌ ${data.reason}`;
    }
  </script>
</body>
</html>
